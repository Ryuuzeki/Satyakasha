# Docker Compose for local development PostgreSQL
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: satyakasha-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: satyakasha_bridge
      POSTGRES_USER: satyakasha
      POSTGRES_PASSWORD: satyakasha_dev_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satyakasha -d satyakasha_bridge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
